name: Upload file from URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct URL of the file to download'
        required: true
        type: string
      filename:
        description: 'Optional custom filename (with extension)'
        required: false
        type: string
        default: ''

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 now, silences warning

    steps:
      - uses: actions/checkout@v4

      - name: Download file
        run: |
          if [ -z "${{ inputs.filename }}" ]; then
            fname=$(basename "${{ inputs.url }}" | cut -d '?' -f 1)
          else
            fname="${{ inputs.filename }}"
          fi
          echo "Downloading ${{ inputs.url }} → uploads/$fname"
          mkdir -p uploads
          curl -L -o "uploads/$fname" "${{ inputs.url }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploads/

          # Only commit and push if there are actual changes
          if git diff --staged --quiet; then
            echo "✅ No changes detected (file identical to existing one). Nothing to commit."
          else
            git commit -m "Add/update file from ${{ inputs.url }}"
            git push
            echo "✅ File committed and pushed."
          fi
